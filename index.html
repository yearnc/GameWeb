<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏小站</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="shell">
        <!-- 顶栏 -->
        <header class="topbar">
            <div class="topbar-inner">
                <span class="logo">游戏小站</span>
                <span class="logo-dot"></span>
            </div>
        </header>

        <!-- 主内容 -->
        <main class="main">
            <!-- 区域：推理竞技 -->
            <section class="zone">
                <div class="zone-head">
                    <h2 class="zone-title">推理竞技</h2>
                    <span class="zone-count">6 款</span>
                </div>
                <div class="zone-grid">
                    <a href="/werewolf" class="tile">
                        <div class="tile-icon">🐺</div>
                        <span class="tile-name">狼人杀</span>
                    </a>
                    <a href="/undercover" class="tile">
                        <div class="tile-icon">🕵️</div>
                        <span class="tile-name">谁是卧底</span>
                    </a>
                    <a href="/turtlesoup" class="tile">
                        <div class="tile-icon">🐢</div>
                        <span class="tile-name">海龟汤</span>
                    </a>
                    <a href="/idiom" class="tile">
                        <div class="tile-icon">📜</div>
                        <span class="tile-name">成语接龙</span>
                    </a>
                    <a href="/wordguess" class="tile">
                        <div class="tile-icon">💬</div>
                        <span class="tile-name">猜词游戏</span>
                    </a>
                    <a href="/drawguess" class="tile">
                        <div class="tile-icon">🎨</div>
                        <span class="tile-name">你画我猜</span>
                    </a>
                </div>
            </section>

            <!-- 区域：棋牌桌游 -->
            <section class="zone">
                <div class="zone-head">
                    <h2 class="zone-title">棋牌桌游</h2>
                    <span class="zone-count">3 款</span>
                </div>
                <div class="zone-grid">
                    <a href="/go" class="tile">
                        <div class="tile-icon">⚪</div>
                        <span class="tile-name">围棋</span>
                    </a>
                    <a href="/gomoku" class="tile">
                        <div class="tile-icon">⚫</div>
                        <span class="tile-name">五子棋</span>
                    </a>
                    <a href="/tictactoe" class="tile">
                        <div class="tile-icon">＃</div>
                        <span class="tile-name">井字棋</span>
                    </a>
                </div>
            </section>

            <!-- 区域：休闲小游戏 -->
            <section class="zone">
                <div class="zone-head">
                    <h2 class="zone-title">休闲小游戏</h2>
                    <span class="zone-count">9 款</span>
                </div>
                <div class="zone-grid">
                    <a href="/tetris" class="tile">
                        <div class="tile-icon">🧱</div>
                        <span class="tile-name">俄罗斯方块</span>
                    </a>
                    <a href="/snake" class="tile">
                        <div class="tile-icon">🐍</div>
                        <span class="tile-name">贪吃蛇</span>
                    </a>
                    <a href="/game2048" class="tile">
                        <div class="tile-icon">🔢</div>
                        <span class="tile-name">2048</span>
                    </a>
                    <a href="/minesweeper" class="tile">
                        <div class="tile-icon">💣</div>
                        <span class="tile-name">扫雷</span>
                    </a>
                    <a href="/match3" class="tile">
                        <div class="tile-icon">🍬</div>
                        <span class="tile-name">消消乐</span>
                    </a>
                    <a href="/pong" class="tile">
                        <div class="tile-icon">🏓</div>
                        <span class="tile-name">乒乓球</span>
                    </a>
                    <a href="/shooter" class="tile">
                        <div class="tile-icon">✈️</div>
                        <span class="tile-name">飞机大战</span>
                    </a>
                    <a href="/sudoku" class="tile">
                        <div class="tile-icon">🧩</div>
                        <span class="tile-name">数独</span>
                    </a>
                    <a href="/pool" class="tile">
                        <div class="tile-icon">🎱</div>
                        <span class="tile-name">台球</span>
                    </a>
                </div>
            </section>
        </main>

        <footer class="foot">
            <span>made with love</span>
        </footer>
    </div>
</body>
</html>
