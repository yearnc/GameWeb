<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>五子棋</title>
<style>
/* ================================================================
   五子棋 — Gomoku
   ================================================================ */
:root {
    --bg: #f5f0e8;
    --surface: #fefcf8;
    --border: #e6ddd0;
    --text: #2d2418;
    --text-secondary: #6b5e4a;
    --accent: #e08830;
    --radius: 12px;
    --transition: 0.2s ease;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: "Inter", "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 20px;
    -webkit-font-smoothing: antialiased;
}

.container {
    max-width: 680px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
}

/* Header */
.header {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.back-link {
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 0.88rem;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    transition: all var(--transition);
}
.back-link:hover { border-color: #c8b898; color: var(--text); }

.title {
    font-size: 1.2rem;
    font-weight: 700;
    letter-spacing: 0.02em;
}

.header-spacer { width: 70px; }

/* Mode selector */
.mode-bar {
    display: flex;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 4px;
}

.mode-btn {
    padding: 8px 20px;
    border: none;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    background: transparent;
    color: var(--text-secondary);
    font-family: inherit;
    transition: all var(--transition);
}
.mode-btn.active {
    background: #2d2418;
    color: #ede4d6;
}
.mode-btn:hover:not(.active) {
    color: var(--text);
}

/* Board wrapper */
.board-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
}

canvas {
    display: block;
    border-radius: 4px;
}

/* Status bar */
.status-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 0.9rem;
}

.turn-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
}

.stone-dot {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 1.5px solid #c8b898;
    transition: background var(--transition);
}
.stone-dot.black { background: #2d2d2d; border-color: #555; }
.stone-dot.white { background: #f8f8f4; border-color: #ccc; }

.status-text {
    color: var(--text-secondary);
    font-weight: 500;
}

.reset-btn {
    margin-left: auto;
    padding: 6px 16px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    color: var(--text-secondary);
    font-size: 0.82rem;
    cursor: pointer;
    font-family: inherit;
    transition: all var(--transition);
}
.reset-btn:hover {
    border-color: #c8b898;
    color: var(--text);
}

/* Win overlay */
.win-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.win-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 36px 40px;
    text-align: center;
    box-shadow: 0 16px 48px rgba(0,0,0,0.15);
    animation: popIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes popIn {
    from { transform: scale(0.85); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

.win-emoji { font-size: 3rem; margin-bottom: 12px; }
.win-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 16px; }

.win-actions {
    display: flex;
    gap: 10px;
    justify-content: center;
}

.win-btn {
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    border: none;
    transition: all var(--transition);
}
.win-btn.primary {
    background: #2d2418;
    color: #ede4d6;
}
.win-btn.primary:hover { background: #3d3428; }
.win-btn.secondary {
    background: transparent;
    color: var(--text-secondary);
    border: 1px solid var(--border);
}
.win-btn.secondary:hover { border-color: #c8b898; color: var(--text); }

/* Responsive */
@media (max-width: 600px) {
    body { padding: 12px; }
    .container { gap: 14px; }
    .board-wrapper { padding: 8px; }
    .mode-btn { padding: 6px 14px; font-size: 0.8rem; }
    .title { font-size: 1rem; }
    .back-link { font-size: 0.78rem; padding: 4px 10px; }
}
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <a href="/" class="back-link">← 返回主页</a>
        <h1 class="title">五子棋</h1>
        <div class="header-spacer"></div>
    </div>

    <div class="mode-bar" id="modeBar">
        <button class="mode-btn" data-mode="0">观战模式</button>
        <button class="mode-btn active" data-mode="1">人机对战</button>
    </div>

    <div class="board-wrapper">
        <canvas id="board"></canvas>
    </div>

    <div class="status-bar">
        <div class="turn-indicator">
            <div class="stone-dot black" id="turnDot"></div>
            <span class="status-text" id="statusText">黑方回合</span>
        </div>
        <button class="reset-btn" id="resetBtn">重新开始</button>
        <button class="reset-btn" id="spectateBtn" style="display:none">开始观战</button>
    </div>
</div>

<div class="win-overlay" id="winOverlay" style="display:none">
    <div class="win-card">
        <div class="win-emoji" id="winEmoji"></div>
        <div class="win-title" id="winTitle"></div>
        <div class="win-actions">
            <button class="win-btn primary" id="winAgain">再来一局</button>
            <button class="win-btn secondary" id="winHome">返回主页</button>
        </div>
    </div>
</div>

<script>
// ================================================================
// 五子棋 — Game Logic (ported from game.cpp)
// ================================================================

const BOARD_SIZE = 15;
const CELL = 40;
const PAD = 30;
const CANVAS_SIZE = PAD * 2 + (BOARD_SIZE - 1) * CELL;

const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');

// Responsive canvas
function resizeCanvas() {
    var maxW = Math.min(window.innerWidth - 40, 640);
    var scale = maxW / CANVAS_SIZE;
    canvas.width = CANVAS_SIZE;
    canvas.height = CANVAS_SIZE;
    canvas.style.width = (CANVAS_SIZE * Math.min(scale, 1)) + 'px';
    canvas.style.height = (CANVAS_SIZE * Math.min(scale, 1)) + 'px';
}
resizeCanvas();
window.addEventListener('resize', function() { resizeCanvas(); draw(); });

// Game state
var pieces = [];        // [{x, y, type}] type: 0=black, 1=white
var gameMode = 1;       // 0=Spectate(AIvsAI), 1=PvE
var currentColor = 0;   // 0=black, 1=white
var gameOver = false;
var winner = null;
var aiThinking = false;
var winLine = null;     // winning 5 positions

// AI plays white, human plays black
var AI_COLOR = 1;
var HUMAN_COLOR = 0;

// ── Helpers ────────────────────────────────────────────

function isOccupied(x, y) {
    for (var i = 0; i < pieces.length; i++) {
        if (pieces[i].x === x && pieces[i].y === y) return true;
    }
    return false;
}

function checkPiece(x, y, type) {
    for (var i = 0; i < pieces.length; i++) {
        if (pieces[i].x === x && pieces[i].y === y && pieces[i].type === type) return true;
    }
    return false;
}

// ── Win Detection ──────────────────────────────────────

var DIRECTIONS = [[1,0],[0,1],[1,1],[1,-1]];

function checkWin(piece) {
    for (var d = 0; d < DIRECTIONS.length; d++) {
        var dx = DIRECTIONS[d][0];
        var dy = DIRECTIONS[d][1];
        var count = 1;
        var line = [{x: piece.x, y: piece.y}];

        // Positive direction
        for (var j = 1; j < 5; j++) {
            var nx = piece.x + j * dx;
            var ny = piece.y + j * dy;
            if (nx < 0 || nx >= BOARD_SIZE || ny < 0 || ny >= BOARD_SIZE) break;
            if (checkPiece(nx, ny, piece.type)) {
                count++;
                line.push({x: nx, y: ny});
            } else break;
        }

        // Negative direction
        for (var j = 1; j < 5; j++) {
            var nx = piece.x - j * dx;
            var ny = piece.y - j * dy;
            if (nx < 0 || nx >= BOARD_SIZE || ny < 0 || ny >= BOARD_SIZE) break;
            if (checkPiece(nx, ny, piece.type)) {
                count++;
                line.push({x: nx, y: ny});
            } else break;
        }

        if (count >= 5) {
            // Sort the winning line
            line.sort(function(a, b) { return a.x - b.x || a.y - b.y; });
            winLine = line;
            return true;
        }
    }
    return false;
}

// ── AI: Position Evaluation (ported from game.cpp) ─────

function boardIndex(x) { return x * BOARD_SIZE + y; }

function evaluateDirection(x, y, dx, dy, type) {
    var count = 1;
    var openEnds = 0;

    // Positive direction
    for (var i = 1; i < 5; i++) {
        var nx = x + i * dx;
        var ny = y + i * dy;
        if (nx < 0 || nx >= BOARD_SIZE || ny < 0 || ny >= BOARD_SIZE) break;
        if (checkPiece(nx, ny, type)) count++;
        else {
            if (!isOccupied(nx, ny)) openEnds++;
            break;
        }
    }

    // Negative direction
    for (var i = 1; i < 5; i++) {
        var nx = x - i * dx;
        var ny = y - i * dy;
        if (nx < 0 || nx >= BOARD_SIZE || ny < 0 || ny >= BOARD_SIZE) break;
        if (checkPiece(nx, ny, type)) count++;
        else {
            if (!isOccupied(nx, ny)) openEnds++;
            break;
        }
    }

    if (count >= 5) return 100000;
    if (count === 4) {
        if (openEnds === 2) return 10000;
        if (openEnds === 1) return 1000;
    }
    if (count === 3) {
        if (openEnds === 2) return 1000;
        if (openEnds === 1) return 100;
    }
    if (count === 2) {
        if (openEnds === 2) return 100;
        if (openEnds === 1) return 10;
    }
    if (count === 1) {
        if (openEnds === 2) return 10;
    }
    return 0;
}

function evaluatePosition(x, y, type) {
    var attackScore = 0;
    var defenseScore = 0;

    for (var d = 0; d < DIRECTIONS.length; d++) {
        attackScore += evaluateDirection(x, y, DIRECTIONS[d][0], DIRECTIONS[d][1], type);
        defenseScore += evaluateDirection(x, y, DIRECTIONS[d][0], DIRECTIONS[d][1], type === 0 ? 1 : 0);
    }

    return Math.floor(attackScore * 1.1) + defenseScore;
}

function computerMove(type) {
    if (pieces.length === 0) {
        // 第一手随机在天元附近
        var openers = [{x:7,y:7},{x:6,y:7},{x:7,y:6},{x:8,y:7},{x:7,y:8}];
        var pick = openers[Math.floor(Math.random() * openers.length)];
        return {x: pick.x, y: pick.y, type: type};
    }

    var bestScore = -1;
    var bestMoves = [];

    for (var x = 0; x < BOARD_SIZE; x++) {
        for (var y = 0; y < BOARD_SIZE; y++) {
            if (!isOccupied(x, y)) {
                // 添加微小随机扰动避免死板
                var score = evaluatePosition(x, y, type) + Math.random() * 0.5;
                if (score > bestScore + 0.001) {
                    bestScore = score;
                    bestMoves = [{x: x, y: y}];
                } else if (Math.abs(score - bestScore) < 0.001) {
                    bestMoves.push({x: x, y: y});
                }
            }
        }
    }

    var pick = bestMoves[Math.floor(Math.random() * bestMoves.length)];
    return {x: pick.x, y: pick.y, type: type};
}

// ── Drawing ────────────────────────────────────────────

function boardX(col) { return PAD + col * CELL; }
function boardY(row) { return PAD + row * CELL; }

function draw() {
    var w = CANVAS_SIZE;
    var h = CANVAS_SIZE;

    // Board background — warm wood tone
    ctx.fillStyle = '#e8d5b0';
    ctx.fillRect(0, 0, w, h);

    // Subtle wood grain
    ctx.fillStyle = 'rgba(180,140,100,0.08)';
    for (var i = 0; i < 8; i++) {
        var gx = Math.random() * w;
        var gy = Math.random() * h;
        ctx.beginPath();
        ctx.ellipse(gx, gy, w * 0.6, 3, Math.random() * Math.PI, 0, 6.28);
        ctx.fill();
    }

    // Grid lines
    ctx.strokeStyle = '#5a4a30';
    ctx.lineWidth = 0.8;
    for (var i = 0; i < BOARD_SIZE; i++) {
        var pos = PAD + i * CELL;
        ctx.beginPath();
        ctx.moveTo(PAD, pos);
        ctx.lineTo(PAD + (BOARD_SIZE - 1) * CELL, pos);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(pos, PAD);
        ctx.lineTo(pos, PAD + (BOARD_SIZE - 1) * CELL);
        ctx.stroke();
    }

    // Star points (天元 + 四角星位)
    var stars = [[7,7],[3,3],[3,11],[11,3],[11,11]];
    ctx.fillStyle = '#5a4a30';
    for (var s = 0; s < stars.length; s++) {
        ctx.beginPath();
        ctx.arc(boardX(stars[s][0]), boardY(stars[s][1]), 3.5, 0, 6.28);
        ctx.fill();
    }

    // Board border (drawn before stones)
    ctx.strokeStyle = '#8b6f47';
    ctx.lineWidth = 2;
    ctx.strokeRect(PAD - 2, PAD - 2, (BOARD_SIZE - 1) * CELL + 4, (BOARD_SIZE - 1) * CELL + 4);

    // Stones
    for (var i = 0; i < pieces.length; i++) {
        var p = pieces[i];
        var sx = boardX(p.x);
        var sy = boardY(p.y);
        var r = CELL * 0.44;

        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        ctx.beginPath();
        ctx.arc(sx + 1.5, sy + 1.5, r, 0, 6.28);
        ctx.fill();

        // Stone body
        var grad = ctx.createRadialGradient(sx - r*0.3, sy - r*0.35, r*0.1, sx, sy, r);
        if (p.type === 0) {
            // Black stone
            grad.addColorStop(0, '#555');
            grad.addColorStop(0.6, '#1a1a1a');
            grad.addColorStop(1, '#000');
        } else {
            // White stone
            grad.addColorStop(0, '#fff');
            grad.addColorStop(0.5, '#f4f4f0');
            grad.addColorStop(1, '#d8d8d0');
        }
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(sx, sy, r, 0, 6.28);
        ctx.fill();

        // Small highlight
        if (p.type === 0) {
            ctx.fillStyle = 'rgba(255,255,255,0.08)';
        } else {
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
        }
        ctx.beginPath();
        ctx.arc(sx - r*0.25, sy - r*0.3, r*0.2, 0, 6.28);
        ctx.fill();
    }

    // Last move marker
    if (pieces.length > 0 && !gameOver) {
        var last = pieces[pieces.length - 1];
        var lx = boardX(last.x);
        var ly = boardY(last.y);
        ctx.fillStyle = last.type === 0 ? '#f88' : '#c44';
        ctx.beginPath();
        ctx.arc(lx, ly, 3.5, 0, 6.28);
        ctx.fill();
    }

    // Win line highlight
    if (winLine) {
        for (var i = 0; i < winLine.length; i++) {
            var wx = boardX(winLine[i].x);
            var wy = boardY(winLine[i].y);
            ctx.strokeStyle = '#e04040';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.arc(wx, wy, CELL * 0.46, 0, 6.28);
            ctx.stroke();
        }
    }

}

// ── Game Actions ───────────────────────────────────────

function canvasPos(e) {
    var rect = canvas.getBoundingClientRect();
    var scaleX = CANVAS_SIZE / rect.width;
    var scaleY = CANVAS_SIZE / rect.height;
    return {
        x: (e.clientX - rect.left) * scaleX,
        y: (e.clientY - rect.top) * scaleY
    };
}

function tryPlace(x, y) {
    if (gameOver || aiThinking) return;

    // Snap to grid
    var col = Math.round((x - PAD) / CELL);
    var row = Math.round((y - PAD) / CELL);

    if (col < 0 || col >= BOARD_SIZE || row < 0 || row >= BOARD_SIZE) return;
    if (isOccupied(col, row)) return;

    // Block human clicks in spectate mode, or during AI turn in PvE
    if (gameMode === 0 || (gameMode === 1 && currentColor !== HUMAN_COLOR)) return;

    placePiece(col, row, currentColor);
}

function placePiece(x, y, type) {
    var piece = {x: x, y: y, type: type};
    pieces.push(piece);

    if (checkWin(piece)) {
        gameOver = true;
        winner = type;
        draw();
        updateStatus();
        showWinOverlay();
        return;
    }

    // Check draw
    if (pieces.length >= BOARD_SIZE * BOARD_SIZE) {
        gameOver = true;
        draw();
        updateStatus();
        return;
    }

    currentColor = currentColor === 0 ? 1 : 0;
    winLine = null;
    draw();
    updateStatus();

    // Trigger AI for spectate (both sides) or PvE (white only)
    var isAI = (gameMode === 0) || (gameMode === 1 && currentColor === AI_COLOR);
    if (isAI && !gameOver) {
        aiThinking = true;
        updateStatus();
        var delay = gameMode === 0 ? 500 : 200;
        setTimeout(aiTurn, delay);
    }
}

function aiTurn() {
    if (gameOver) { aiThinking = false; return; }
    aiThinking = false;
    var move = computerMove(currentColor);
    placePiece(move.x, move.y, move.type);
}

function updateStatus() {
    var dot = document.getElementById('turnDot');
    var text = document.getElementById('statusText');

    dot.className = 'stone-dot';
    if (gameOver) {
        if (winner !== null) {
            dot.classList.add(winner === 0 ? 'black' : 'white');
            text.textContent = (winner === 0 ? '黑方' : '白方') + '获胜！';
        } else {
            text.textContent = '平局！';
        }
    } else if (aiThinking) {
        dot.classList.add(currentColor === 0 ? 'black' : 'white');
        text.textContent = 'AI 思考中...';
    } else {
        dot.classList.add(currentColor === 0 ? 'black' : 'white');
        if (gameMode === 1 && currentColor === HUMAN_COLOR) {
            text.textContent = '你的回合';
        } else {
            text.textContent = (currentColor === 0 ? '黑方' : '白方') + '回合';
        }
    }
}

function showWinOverlay() {
    var overlay = document.getElementById('winOverlay');
    var emoji = document.getElementById('winEmoji');
    var title = document.getElementById('winTitle');

    if (winner === 0) {
        emoji.textContent = '⚫';
        title.textContent = '黑方获胜！';
    } else {
        emoji.textContent = '⚪';
        title.textContent = '白方获胜！';
    }

    if (gameMode === 1) {
        if (winner === HUMAN_COLOR) {
            emoji.textContent = '🎉';
            title.textContent = '你赢了！';
        } else {
            emoji.textContent = '🤖';
            title.textContent = 'AI 获胜！';
        }
    }

    overlay.style.display = '';
}

function hideWinOverlay() {
    document.getElementById('winOverlay').style.display = 'none';
}

function resetGame() {
    pieces = [];
    currentColor = 0; // Black first
    gameOver = false;
    winner = null;
    aiThinking = false;
    winLine = null;
    hideWinOverlay();
    draw();
    updateStatus();
    var specBtn = document.getElementById('spectateBtn');
    if (gameMode === 0) {
        specBtn.style.display = '';
        updateStatus();
    } else {
        specBtn.style.display = 'none';
    }
}

// ── Event Listeners ────────────────────────────────────

canvas.addEventListener('click', function(e) {
    var pos = canvasPos(e);
    tryPlace(pos.x, pos.y);
});

// Mode selection
document.querySelectorAll('.mode-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.mode-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        gameMode = parseInt(btn.dataset.mode);
        resetGame();
    });
});

// Reset button
document.getElementById('resetBtn').addEventListener('click', resetGame);

// Spectate start button
document.getElementById('spectateBtn').addEventListener('click', function() {
    this.style.display = 'none';
    aiThinking = true;
    updateStatus();
    setTimeout(aiTurn, 400);
});

// Win overlay buttons
document.getElementById('winAgain').addEventListener('click', resetGame);
document.getElementById('winHome').addEventListener('click', function() {
    window.location.href = '/';
});

// ── Init ────────────────────────────────────────────────
resetGame();
</script>
</body>
</html>
