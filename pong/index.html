<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>乒乓球</title>
<style>
:root {
    --bg: #0a0a14;
    --table: #1a472a;
    --table-light: #2d7a3f;
    --net: #e8e8e8;
    --text: #e8e4dc;
    --text-dim: #888;
    --accent: #ff6b35;
    --radius: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: "Inter", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 16px;
    user-select: none;
    -webkit-user-select: none;
    overflow: hidden;
}
.container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    max-width: 820px;
    width: 100%;
}

/* Header */
.header {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 4px;
}
.back-link {
    color: var(--text-dim);
    text-decoration: none;
    font-size: 0.85rem;
    padding: 6px 14px;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    background: rgba(255,255,255,0.04);
    transition: all 0.2s;
}
.back-link:hover { border-color: rgba(255,255,255,0.3); color: var(--text); }
.title { font-size: 1.2rem; font-weight: 700; letter-spacing: 0.04em; }

/* Scoreboard */
.scoreboard {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 10px 20px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: var(--radius);
}
.score-item {
    text-align: center;
    min-width: 60px;
}
.score-label {
    font-size: 0.7rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
}
.score-val {
    font-size: 2.2rem;
    font-weight: 800;
    line-height: 1.1;
    transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1);
}
.score-val.pop { transform: scale(1.35); color: var(--accent); }
.score-divider {
    font-size: 1rem;
    color: rgba(255,255,255,0.15);
    font-weight: 300;
}

/* Game area */
.game-wrap {
    position: relative;
    width: 100%;
    max-width: 760px;
}
canvas {
    display: block;
    width: 100%;
    height: auto;
    border-radius: var(--radius);
    cursor: none;
    box-shadow: 0 0 60px rgba(45,122,63,0.15), 0 8px 32px rgba(0,0,0,0.3);
}

/* Overlay */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.overlay-card {
    background: #1a1a24;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: var(--radius);
    padding: 36px 42px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
    max-width: 360px;
    width: 90%;
}
@keyframes popIn { from { transform: scale(0.88); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.overlay-card h2 { font-size: 1.4rem; margin-bottom: 8px; }
.overlay-card .result-detail { font-size: 0.88rem; color: var(--text-dim); margin-bottom: 10px; }
.overlay-card .final-scores { display: flex; justify-content: center; gap: 40px; margin: 16px 0; }
.overlay-card .final-scores .fs-item { text-align: center; }
.overlay-card .final-scores .fs-val { font-size: 2.4rem; font-weight: 800; }
.overlay-card .final-scores .fs-label { font-size: 0.72rem; color: var(--text-dim); text-transform: uppercase; }
.overlay-btns { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
.overlay-btns button {
    padding: 9px 24px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    background: rgba(255,255,255,0.06);
    color: var(--text);
    font-size: 0.85rem;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
}
.overlay-btns button:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.3); }
.overlay-btns button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.overlay-btns button.primary:hover { background: #ff8250; }

/* Hints */
.hint { font-size: 0.72rem; color: var(--text-dim); text-align: center; opacity: 0.8; }

@media (max-width: 600px) {
    body { padding: 8px; }
    .container { gap: 8px; }
    .score-val { font-size: 1.6rem; }
    .overlay-card { padding: 24px 20px; }
}
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <a href="/" class="back-link">← 返回主页</a>
        <h1 class="title">🏓 乒乓球</h1>
        <div style="width:72px"></div>
    </div>

    <div class="scoreboard">
        <div class="score-item">
            <div class="score-label">你</div>
            <div class="score-val" id="s1">0</div>
        </div>
        <div class="score-divider">:</div>
        <div class="score-item">
            <div class="score-label">AI</div>
            <div class="score-val" id="s2">0</div>
        </div>
    </div>

    <div class="game-wrap">
        <canvas id="canvas" width="760" height="440"></canvas>
    </div>

    <div style="margin-top:0;">
        <button id="btnRestart" onclick="restartGame()" style="padding:8px 20px;border:1px solid rgba(255,255,255,0.12);border-radius:10px;background:rgba(255,255,255,0.04);color:var(--text);font-size:0.82rem;cursor:pointer;font-family:inherit;transition:all 0.2s;" onmouseenter="this.style.borderColor='rgba(255,255,255,0.3)'" onmouseleave="this.style.borderColor='rgba(255,255,255,0.12)'">🔄 重新开始</button>
    </div>
    <p class="hint">移动鼠标或手指上下控制球拍 🏓</p>
</div>

<script>
// ================================================================
// PING PONG — Polished Edition
// ================================================================

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// Canvas logical size
const W = 760, H = 440;

// Game state
const WIN_SCORE = 11;
let s1 = 0, s2 = 0;
let gameOver = false;
let gameStarted = false;
let countdown = 0;

// Ball
let bx, by, bdx, bdy;
const BALL_R = 9;
const MAX_BALL_SPEED = 12;     // speed cap
let rallyCount = 0;            // consecutive hits
let hitFlash = 0;              // flash timer on paddle hit
let scorePause = 0;            // pause frames after scoring (2s = 120f @ ~60fps)

// Paddles
const PAD_W = 14, PAD_H = 90;
let p1y, p2y;
let p1TargetY;                 // smooth movement for player
let p1Flash = 0;               // paddle hit flash

// AI
let aiTargetY;
let aiError = 0;               // AI "mistake" offset
let aiReactionDelay = 0;       // frames before AI reacts
const AI_MAX_SPEED = 7.5;

// Particles
let particles = [];

// Trail
let ballTrail = [];

// Responsive sizing
function resize() {
    const wrap = canvas.parentElement;
    const maxW = Math.min(wrap.clientWidth - 8, 760);
    canvas.style.width = maxW + 'px';
    canvas.style.height = (maxW * H / W) + 'px';
}
window.addEventListener('resize', resize);
resize();

// ── Init ──────────────────────────────────────────────────

function initBall() {
    bx = W / 2;
    by = H / 2;
    const angle = (Math.random() * 0.6 - 0.3) + (Math.random() > 0.5 ? 0 : Math.PI);
    const speed = 5.5 + Math.random();
    bdx = Math.cos(angle) * speed * (Math.random() > 0.5 ? 1 : -1);
    bdy = Math.sin(angle) * speed;
    // Minimum horizontal speed
    if (Math.abs(bdx) < 3.5) bdx = (bdx > 0 ? 1 : -1) * 3.5;
    rallyCount = 0;
    ballTrail = [];
}

function resetAll() {
    s1 = 0; s2 = 0;
    p1y = H / 2 - PAD_H / 2;
    p1TargetY = p1y;
    p2y = H / 2 - PAD_H / 2;
    aiTargetY = p2y;
    aiError = 0;
    aiReactionDelay = 0;
    particles = [];
    ballTrail = [];
    gameOver = false;
    gameStarted = false;
    countdown = 0;
    hitFlash = 0;
    p1Flash = 0;
    scorePause = 0;
    initBall();
    updateScoreDisplay();
}

function restartGame() {
    const ov = document.querySelector('.overlay');
    if (ov) ov.remove();
    resetAll();
    draw();
}

// ── Particles ─────────────────────────────────────────────

function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1.5 + Math.random() * 4;
        particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 1,
            decay: 0.02 + Math.random() * 0.04,
            size: 1.5 + Math.random() * 3,
            color
        });
    }
}

function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life -= p.decay;
        if (p.life <= 0) particles.splice(i, 1);
    }
}

function drawParticles() {
    for (const p of particles) {
        ctx.fillStyle = `rgba(${p.color},${p.life})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

// ── Ball Trail ────────────────────────────────────────────

function updateTrail() {
    ballTrail.push({ x: bx, y: by, life: 1 });
    for (let i = ballTrail.length - 1; i >= 0; i--) {
        ballTrail[i].life -= 0.06;
        if (ballTrail[i].life <= 0) ballTrail.splice(i, 1);
    }
}

function drawTrail() {
    for (let i = 0; i < ballTrail.length - 1; i++) {
        const t = ballTrail[i];
        const alpha = t.life * 0.3;
        const r = BALL_R * t.life * 0.7;
        if (r < 0.5) continue;
        ctx.fillStyle = `rgba(255,180,80,${alpha})`;
        ctx.beginPath();
        ctx.arc(t.x, t.y, r, 0, Math.PI * 2);
        ctx.fill();
    }
}

// ── Drawing ───────────────────────────────────────────────

function drawTable() {
    // Background
    const tableGrad = ctx.createLinearGradient(0, 0, 0, H);
    tableGrad.addColorStop(0, '#1a3d28');
    tableGrad.addColorStop(0.4, '#1d5232');
    tableGrad.addColorStop(0.6, '#1d5232');
    tableGrad.addColorStop(1, '#1a3d28');
    ctx.fillStyle = tableGrad;
    ctx.fillRect(0, 0, W, H);

    // Table edge highlight
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 3;
    ctx.strokeRect(2, 2, W - 4, H - 4);

    // Court lines (outer)
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([]);
    ctx.strokeRect(20, 10, W - 40, H - 20);

    // Center line
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.lineWidth = 1;
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(W / 2, 10);
    ctx.lineTo(W / 2, H - 10);
    ctx.stroke();

    // Center circle
    ctx.strokeStyle = 'rgba(255,255,255,0.07)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(W / 2, H / 2, 60, 0, Math.PI * 2);
    ctx.stroke();
}

function drawNet() {
    const netX = W / 2;
    const netPoleW = 4;

    // Net shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.fillRect(netX - 1, 8, 2, H - 16);

    // Net mesh
    const meshInterval = 6;
    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.lineWidth = 0.5;
    for (let y = 10; y < H - 10; y += meshInterval) {
        ctx.beginPath();
        ctx.moveTo(netX - 10, y);
        ctx.lineTo(netX + 10, y);
        ctx.stroke();
    }
    // Vertical mesh lines
    for (let x = netX - 10; x <= netX + 10; x += meshInterval) {
        ctx.beginPath();
        ctx.moveTo(x, 10);
        ctx.lineTo(x, H - 10);
        ctx.stroke();
    }

    // Net posts
    ctx.fillStyle = '#ccc';
    ctx.fillRect(netX - netPoleW / 2, 6, netPoleW, 14);
    ctx.fillRect(netX - netPoleW / 2, H - 20, netPoleW, 14);

    // Net top bar
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fillRect(netX - 11, 10, 22, 2);
}

function drawPaddle(x, y, isRight, flash) {
    const px = isRight ? x - PAD_W : x;
    const py = y;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    roundRect(ctx, px + 2, py + 2, PAD_W, PAD_H, PAD_W / 2);
    ctx.fill();

    // Paddle body
    const grad = ctx.createLinearGradient(px, 0, px + PAD_W, 0);
    if (isRight) {
        grad.addColorStop(0, '#c0392b');
        grad.addColorStop(0.3, '#e74c3c');
        grad.addColorStop(0.7, '#c0392b');
        grad.addColorStop(1, '#922b21');
    } else {
        grad.addColorStop(0, '#2471a3');
        grad.addColorStop(0.3, '#3498db');
        grad.addColorStop(0.7, '#2471a3');
        grad.addColorStop(1, '#1a5276');
    }
    ctx.fillStyle = grad;
    ctx.beginPath();
    roundRect(ctx, px, py, PAD_W, PAD_H, PAD_W / 2);
    ctx.fill();

    // Edge highlight
    if (isRight) {
        ctx.strokeStyle = 'rgba(255,150,140,0.3)';
    } else {
        ctx.strokeStyle = 'rgba(150,200,255,0.3)';
    }
    ctx.lineWidth = 1;
    ctx.beginPath();
    roundRect(ctx, px + 1, py + 1, PAD_W - 2, PAD_H - 2, PAD_W / 2 - 1);
    ctx.stroke();

    // Hit flash
    if (flash > 0) {
        ctx.fillStyle = `rgba(255,255,255,${flash * 0.4})`;
        ctx.beginPath();
        roundRect(ctx, px, py, PAD_W, PAD_H, PAD_W / 2);
        ctx.fill();
    }
}

function drawBall() {
    // Glow
    const glowGrad = ctx.createRadialGradient(bx, by, BALL_R * 0.3, bx, by, BALL_R * 1.8);
    glowGrad.addColorStop(0, 'rgba(255,200,100,0.3)');
    glowGrad.addColorStop(1, 'rgba(255,150,50,0)');
    ctx.fillStyle = glowGrad;
    ctx.beginPath();
    ctx.arc(bx, by, BALL_R * 1.8, 0, Math.PI * 2);
    ctx.fill();

    // Ball body
    const ballGrad = ctx.createRadialGradient(bx - BALL_R * 0.25, by - BALL_R * 0.3, BALL_R * 0.1, bx, by, BALL_R);
    ballGrad.addColorStop(0, '#fff');
    ballGrad.addColorStop(0.4, '#ffb347');
    ballGrad.addColorStop(1, '#d4700a');
    ctx.fillStyle = ballGrad;
    ctx.beginPath();
    ctx.arc(bx, by, BALL_R, 0, Math.PI * 2);
    ctx.fill();

    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath();
    ctx.arc(bx - BALL_R * 0.28, by - BALL_R * 0.28, BALL_R * 0.22, 0, Math.PI * 2);
    ctx.fill();
}

function roundRect(ctx, x, y, w, h, r) {
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
}

function drawCountdown() {
    if (countdown <= 0) return;

    // Darken background
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(0, 0, W, H);

    const text = countdown === 4 ? '准备好了吗？' : countdown === 1 ? 'GO!' : String(countdown - 1);
    const size = countdown === 1 ? 72 : countdown === 4 ? 28 : 56;

    ctx.fillStyle = '#fff';
    ctx.font = `bold ${size}px "Inter","PingFang SC","Microsoft YaHei",sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(255,255,255,0.4)';
    ctx.shadowBlur = 20;
    ctx.fillText(text, W / 2, H / 2);
    ctx.shadowBlur = 0;
    ctx.textAlign = 'start';
    ctx.textBaseline = 'alphabetic';

    if (countdown === 1) {
        // GO! pulse effect
        const pulse = 1 + 0.15 * Math.sin(Date.now() / 50);
        ctx.font = `bold ${Math.round(72 * pulse)}px "Inter","PingFang SC","Microsoft YaHei",sans-serif`;
        ctx.fillStyle = 'rgba(255,200,100,0.5)';
        ctx.textAlign = 'center';
        ctx.fillText('GO!', W / 2, H / 2);
        ctx.textAlign = 'start';
    }
}

function draw() {
    ctx.clearRect(0, 0, W, H);

    drawTable();
    drawNet();

    // Trail behind ball
    drawTrail();

    // Paddles
    drawPaddle(0, p1y, false, p1Flash);
    drawPaddle(W - PAD_W, p2y, true, hitFlash);

    // Ball
    drawBall();

    // Particles
    drawParticles();

    // Countdown overlay
    if (countdown > 0 && !gameOver) {
        drawCountdown();
    }

    // Start hint
    if (!gameStarted && countdown <= 0 && !gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.35)';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 22px "Inter","PingFang SC","Microsoft YaHei",sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('点击屏幕开始', W / 2, H / 2 - 8);
        ctx.font = '14px "Inter","PingFang SC","Microsoft YaHei",sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.fillText(`${WIN_SCORE} 分制 · 鼠标移动球拍`, W / 2, H / 2 + 24);
        ctx.textAlign = 'start';
    }
}

// ── Game Loop ──────────────────────────────────────────────

function loop() {
    if (gameOver) { draw(); return; }

    if (countdown > 0) {
        // Countdown is running — ball doesn't move
        draw();
        requestAnimationFrame(loop);
        return;
    }

    if (!gameStarted) {
        draw();
        requestAnimationFrame(loop);
        return;
    }

    // Score pause — wait before next serve
    if (scorePause > 0) {
        scorePause--;
        updateParticles();
        if (scorePause === 0) {
            initBall();
        }
        draw();
        requestAnimationFrame(loop);
        return;
    }

    // Update ball
    bx += bdx;
    by += bdy;

    // Wall bounce (top/bottom)
    if (by <= BALL_R) {
        by = BALL_R;
        bdy = Math.abs(bdy);
        spawnParticles(bx, by, '255,255,255', 3);
    }
    if (by >= H - BALL_R) {
        by = H - BALL_R;
        bdy = -Math.abs(bdy);
        spawnParticles(bx, by, '255,255,255', 3);
    }

    // Smooth player paddle
    if (p1TargetY !== undefined) {
        p1y += (p1TargetY - p1y) * 0.35;
    }

    // Left paddle collision (player)
    if (bx - BALL_R <= PAD_W && bx > 0) {
        if (by > p1y - BALL_R * 0.5 && by < p1y + PAD_H + BALL_R * 0.5) {
            const rel = ((by - p1y) / PAD_H) - 0.5;  // -0.5 to 0.5
            const maxAngle = 0.75;  // ~43 degrees
            const angle = rel * maxAngle;
            let speed = Math.min(Math.sqrt(bdx * bdx + bdy * bdy) + 0.6, MAX_BALL_SPEED);
            bdx = Math.cos(angle) * speed;
            bdy = Math.sin(angle) * speed;
            // Ensure rightward
            if (bdx < 0) bdx = Math.abs(bdx);
            bx = PAD_W + BALL_R;
            rallyCount++;
            p1Flash = 1;
            hitFlash = 0;
            spawnParticles(bx, by, '100,180,255', 12);
        }
    }

    // Right paddle collision (AI)
    if (bx + BALL_R >= W - PAD_W && bx < W) {
        if (by > p2y - BALL_R * 0.5 && by < p2y + PAD_H + BALL_R * 0.5) {
            const rel = ((by - p2y) / PAD_H) - 0.5;
            const maxAngle = 0.75;
            const angle = Math.PI - rel * maxAngle;
            let speed = Math.min(Math.sqrt(bdx * bdx + bdy * bdy) + 0.6, MAX_BALL_SPEED);
            bdx = Math.cos(angle) * speed;
            bdy = Math.sin(angle) * speed;
            // Ensure leftward
            if (bdx > 0) bdx = -Math.abs(bdx);
            bx = W - PAD_W - BALL_R;
            rallyCount++;
            hitFlash = 1;
            p1Flash = 0;
            spawnParticles(bx, by, '255,100,80', 12);
        }
    }

    // Scoring
    if (bx < 0 && scorePause <= 0) {
        // AI scores
        s2++;
        updateScoreDisplay();
        spawnParticles(bx + 20, by, '255,100,80', 25);
        scorePop('s2');
        bx = -20; by = H / 2; bdx = 0; bdy = 0;
        ballTrail = [];
        scorePause = 120;  // ~2 seconds
        if (s2 >= WIN_SCORE) { endGame('AI'); return; }
    }
    if (bx > W && scorePause <= 0) {
        // Player scores
        s1++;
        updateScoreDisplay();
        spawnParticles(bx - 20, by, '100,180,255', 25);
        scorePop('s1');
        bx = W + 20; by = H / 2; bdx = 0; bdy = 0;
        ballTrail = [];
        scorePause = 120;  // ~2 seconds
        if (s1 >= WIN_SCORE) { endGame('你'); return; }
    }

    // AI movement
    updateAI();

    // Update effects
    updateParticles();
    updateTrail();
    if (hitFlash > 0) hitFlash -= 0.08;
    if (p1Flash > 0) p1Flash -= 0.08;

    draw();
    requestAnimationFrame(loop);
}

function updateAI() {
    // AI difficulty scales with player's score and rally length
    const difficulty = Math.min(1, (s1 / WIN_SCORE) * 0.7 + rallyCount * 0.02);

    // Reaction delay: harder AI reacts faster
    if (aiReactionDelay > 0) {
        aiReactionDelay--;
        // During delay, AI guesses — drift toward center
        const center = H / 2 - PAD_H / 2;
        p2y += (center - p2y) * 0.03;
        return;
    }

    // AI target: predict where ball will be when it reaches AI's side
    // Simple prediction: track ball, add error based on difficulty
    let targetY;

    if (bdx > 0) {
        // Ball coming toward AI
        const distToAI = W - PAD_W - bx;
        const timeToArrive = distToAI / Math.max(Math.abs(bdx), 0.5);
        let predictedY = by + bdy * timeToArrive;

        // Bounce prediction (simplified)
        while (predictedY < BALL_R || predictedY > H - BALL_R) {
            if (predictedY < BALL_R) predictedY = 2 * BALL_R - predictedY;
            if (predictedY > H - BALL_R) predictedY = 2 * (H - BALL_R) - predictedY;
        }

        // AI error (more error = easier)
        const maxError = (1 - difficulty) * 70 + 15;
        aiError += (Math.random() - 0.5) * 8;
        aiError = Math.max(-maxError, Math.min(maxError, aiError * 0.9));

        targetY = predictedY + aiError - PAD_H / 2;
    } else {
        // Ball going away from AI — return to center
        targetY = H / 2 - PAD_H / 2 + (Math.random() - 0.5) * 40;
    }

    // Clamp
    targetY = Math.max(0, Math.min(H - PAD_H, targetY));

    // Move toward target
    const moveSpeed = AI_MAX_SPEED * (0.45 + difficulty * 0.55);
    p2y += (targetY - p2y) * Math.min(0.12 + difficulty * 0.05, 0.17);

    // Set random reaction delay occasionally
    if (bdx > 0 && Math.random() < 0.015 * (1 - difficulty)) {
        aiReactionDelay = Math.floor((1 - difficulty) * 20 + 5);
    }
}

function scorePop(id) {
    const el = document.getElementById(id);
    el.classList.add('pop');
    setTimeout(() => el.classList.remove('pop'), 200);
}

function updateScoreDisplay() {
    document.getElementById('s1').textContent = s1;
    document.getElementById('s2').textContent = s2;
}

function endGame(winner) {
    gameOver = true;
    updateScoreDisplay();

    const isPlayerWin = winner === '你';
    const overlay = document.createElement('div');
    overlay.className = 'overlay';
    overlay.innerHTML =
        `<div class="overlay-card">
            <h2>${isPlayerWin ? '🎉 你赢了！' : '😔 AI 获胜'}</h2>
            <p class="result-detail">${isPlayerWin ? '太厉害了主人！' : '别灰心，再来一局~'}</p>
            <div class="final-scores">
                <div class="fs-item">
                    <div class="fs-val">${s1}</div>
                    <div class="fs-label">你</div>
                </div>
                <div style="font-size:1.5rem;color:var(--text-dim);line-height:2.4rem;">:</div>
                <div class="fs-item">
                    <div class="fs-val">${s2}</div>
                    <div class="fs-label">AI</div>
                </div>
            </div>
            <p style="font-size:0.75rem;color:var(--text-dim);margin-top:4px">最高连击 ${rallyCount} 拍</p>
            <div class="overlay-btns">
                <button class="primary" onclick="restartGame()">🔄 再来一局</button>
                <button onclick="window.location.href='/'">🏠 返回主页</button>
            </div>
        </div>`;
    document.body.appendChild(overlay);

    overlay.addEventListener('click', function(e) {
        if (e.target === overlay) { overlay.remove(); resetAll(); draw(); loop(); }
    });
}

// ── Input ──────────────────────────────────────────────────

function getCanvasY(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleY = H / rect.height;
    return (e.clientY - rect.top) * scaleY;
}

canvas.addEventListener('mousemove', function(e) {
    const cy = getCanvasY(e);
    p1TargetY = Math.max(0, Math.min(H - PAD_H, cy - PAD_H / 2));
});

canvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
    const cy = getCanvasY(e.touches[0]);
    p1TargetY = Math.max(0, Math.min(H - PAD_H, cy - PAD_H / 2));
}, { passive: false });

canvas.addEventListener('click', function(e) {
    if (gameOver) return;
    if (!gameStarted) {
        startCountdown();
        return;
    }
});

function startCountdown() {
    gameStarted = true;
    countdown = 4;  // "准备好了吗？" → 3 → 2 → "GO!"
    initBall();
    p1y = H / 2 - PAD_H / 2;
    p1TargetY = p1y;
    p2y = H / 2 - PAD_H / 2;

    const interval = setInterval(() => {
        countdown--;
        if (countdown <= 0) {
            clearInterval(interval);
            // Ball starts moving now
        }
    }, 600);
}

// ── Init ───────────────────────────────────────────────────

resetAll();
draw();
requestAnimationFrame(loop);
</script>
</body>
</html>
