<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>贪吃蛇</title>
<style>
:root{--bg:#f5f0e8;--surface:#fefcf8;--border:#e6ddd0;--text:#2d2418;--text-secondary:#6b5e4a}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);display:flex;justify-content:center;padding:20px;min-height:100vh}
.container{display:flex;flex-direction:column;align-items:center;gap:14px}
.header{width:100%;display:flex;align-items:center;justify-content:space-between}
.back{color:var(--text-secondary);text-decoration:none;font-size:.85rem;padding:5px 12px;border:1px solid var(--border);border-radius:20px;background:var(--surface)}
.back:hover{border-color:#c8b898}
h1{font-size:1.2rem;font-weight:700}
.score{font-size:.9rem;color:var(--text-secondary)}
canvas{background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.04)}
.btn{padding:10px 20px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-secondary);font-size:.82rem;cursor:pointer;font-family:inherit}
.btn:hover{border-color:#c8b898}
.btn.primary{background:#2d2418;color:#ede4d6;border-color:#2d2418}
.hint{font-size:.75rem;color:var(--text-secondary);opacity:.7}
</style>
</head>
<body>
<div class="container">
<div class="header"><a href="/" class="back">← 返回</a><h1>贪吃蛇</h1><div style="width:50px"></div></div>
<div class="score">得分: <b id="score">0</b> 最高: <b id="high">0</b></div>
<canvas id="board"></canvas>
<button class="btn primary" id="btnReset">重新开始</button>
<p class="hint">按方向键/WASD 开始游戏</p>
</div>
<script>
var SIZE=20,CELL=18;var canvas=document.getElementById('board'),ctx=canvas.getContext('2d');
canvas.width=SIZE*CELL;canvas.height=SIZE*CELL;
var snake=[{x:10,y:10}],food={x:15,y:10},dir={x:0,y:0},nextDir={x:0,y:0},started=false;
var score=0,high=parseInt(localStorage.getItem('snakeHigh')||'0'),gameOver=true,timer=null;
document.getElementById('high').textContent=high;

function spawnFood(){do{food={x:Math.floor(Math.random()*SIZE),y:Math.floor(Math.random()*SIZE)};}while(snake.some(function(s){return s.x===food.x&&s.y===food.y;}));}
function reset(){clearTimeout(timer);snake=[{x:10,y:10}];dir={x:0,y:0};nextDir={x:0,y:0};started=false;score=0;gameOver=false;document.getElementById('score').textContent=score;spawnFood();draw();loop();}
function loop(){if(gameOver||!started){timer=setTimeout(loop,150);return;}var head=snake[0];var nx=head.x+nextDir.x,ny=head.y+nextDir.y;dir=nextDir;
if(nx<0||nx>=SIZE||ny<0||ny>=SIZE||snake.some(function(s){return s.x===nx&&s.y===ny;})){gameOver=true;if(score>high){high=score;localStorage.setItem('snakeHigh',high);document.getElementById('high').textContent=high;}draw();ctx.fillStyle='rgba(0,0,0,.4)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#fff';ctx.font='bold 20px Inter';ctx.textAlign='center';ctx.fillText('游戏结束',canvas.width/2,canvas.height/2);ctx.textAlign='start';return;}
snake.unshift({x:nx,y:ny});if(nx===food.x&&ny===food.y){score+=10;document.getElementById('score').textContent=score;spawnFood();}else{snake.pop();}
draw();var spd=Math.floor((120-Math.min(80,Math.floor(score/100)*5))/0.8);timer=setTimeout(loop,spd);}
function draw(){ctx.fillStyle='#fefcf8';ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.strokeStyle='#f0ebe0';ctx.lineWidth=.5;for(var i=0;i<=SIZE;i++){ctx.beginPath();ctx.moveTo(i*CELL,0);ctx.lineTo(i*CELL,SIZE*CELL);ctx.stroke();ctx.beginPath();ctx.moveTo(0,i*CELL);ctx.lineTo(SIZE*CELL,i*CELL);ctx.stroke();}
ctx.fillStyle='#e08830';ctx.beginPath();ctx.arc(food.x*CELL+CELL/2,food.y*CELL+CELL/2,CELL/2-2,0,Math.PI*2);ctx.fill();
snake.forEach(function(s,i){ctx.fillStyle=i===0?'#27ae60':'#2ecc71';ctx.fillRect(s.x*CELL+1,s.y*CELL+1,CELL-2,CELL-2);ctx.fillStyle='rgba(255,255,255,.15)';ctx.fillRect(s.x*CELL+1,s.y*CELL+1,CELL-2,4);});}

document.addEventListener('keydown',function(e){var m={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},w:{x:0,y:-1},W:{x:0,y:-1},s:{x:0,y:1},S:{x:0,y:1},a:{x:-1,y:0},A:{x:-1,y:0},d:{x:1,y:0},D:{x:1,y:0},KeyW:{x:0,y:-1},KeyA:{x:-1,y:0},KeyS:{x:0,y:1},KeyD:{x:1,y:0}};
var key=m[e.key]||m[e.code];if(key&&!(key.x===-dir.x&&key.y===-dir.y)){nextDir=key;started=true;e.preventDefault();if(gameOver)reset();}});
document.getElementById('btnReset').onclick=reset;reset();
</script>
</body>
</html>
